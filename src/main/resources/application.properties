# FitFinder Application Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration (H2 for local development)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.url=jdbc:h2:file:./users
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.fitfinder=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Miragic API Configuration - YOUR API KEY
miragic.api-key=
miragic.base-url=https://backend.miragic.ai

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Application Folders
app.tmp-folder=tmp
app.generated-folder=generated_outfits

# Secret Key for Session
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true

# Enable CORS
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
