<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FitFinder</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      display: flex;
      width: 800px;
      height: 550px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .register-section {
      flex: 1;
      padding: 40px;
    }

    .register-section h2 {
      font-size: 22px;
      margin-bottom: 10px;
      font-family: Georgia, serif;
    }

    .register-section p {
      font-size: 14px;
      color: #777;
      margin-bottom: 20px;
    }

    .input-box {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .register-btn {
      width: 100%;
      padding: 12px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 15px;
    }

    .register-btn:hover {
      background: #333;
    }

    .register-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .image-section {
      flex: 1;
      background: url('https://images.unsplash.com/photo-1445205170230-053b83016050?w=800') no-repeat center center/cover;
      position: relative;
    }

    .login-link {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    .login-link a {
      color: #ff8c00;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    .success {
      color: green;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="register-section">
      <h2>Create Account</h2>
      <p>Join FitFinder and discover your style!</p>

      <input type="text" id="userid" placeholder="Choose a UserID" class="input-box">
      <input type="password" id="password" placeholder="Choose a Password" class="input-box">
      <input type="password" id="confirmPassword" placeholder="Confirm Password" class="input-box">

      <button class="register-btn" id="registerBtn">Create Account</button>
      <p class="error" id="error"></p>
      <p class="success" id="success"></p>
      <p class="login-link">Already have an account? <a href="login page.html">Login here</a></p>
    </div>

    <div class="image-section"></div>
  </div>

<script>
  document.getElementById("registerBtn").addEventListener("click", async function() {
    const userid = document.getElementById("userid").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const errorEl = document.getElementById("error");
    const successEl = document.getElementById("success");
    const btn = document.getElementById("registerBtn");

    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    if (!userid || !password) {
      errorEl.textContent = 'Please enter UserID and Password';
      errorEl.style.display = 'block';
      return;
    }

    if (password !== confirmPassword) {
      errorEl.textContent = 'Passwords do not match';
      errorEl.style.display = 'block';
      return;
    }

    if (password.length < 6) {
      errorEl.textContent = 'Password must be at least 6 characters';
      errorEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      const response = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ userid, password })
      });

      const data = await response.json();

      if (data.success) {
        successEl.textContent = 'Account created! Redirecting to login...';
        successEl.style.display = 'block';
        setTimeout(() => {
          window.location.href = 'login page.html';
        }, 1500);
      } else {
        errorEl.textContent = data.message || 'Registration failed';
        errorEl.style.display = 'block';
      }
    } catch (error) {
      console.error('Registration error:', error);
      errorEl.textContent = 'Registration failed. Please try again.';
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });

  // Allow Enter key to submit
  document.getElementById("confirmPassword").addEventListener("keypress", function(e) {
    if (e.key === 'Enter') {
      document.getElementById("registerBtn").click();
    }
  });
</script>

</body>
</html>
