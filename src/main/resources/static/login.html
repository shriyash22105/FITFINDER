<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FitFinder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      width: 300px;
    }
    h2 {
      margin-top: 0;
      color: #333;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    button:disabled {
      background: #ccc;
    }
    .link {
      text-align: center;
      margin-top: 15px;
      color: #666;
    }
    .link a {
      color: #007bff;
      text-decoration: none;
    }
    .link a:hover {
      text-decoration: underline;
    }
    .error {
      color: red;
      font-size: 14px;
      margin: 10px 0;
      text-align: center;
    }
    .loading {
      text-align: center;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <input type="text" id="userid" placeholder="UserID">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Log in</button>
    <p class="error" id="error"></p>
    <p class="link">Don't have an account? <a href="register.html">Register here</a></p>
    <p class="link"><a href="index.html">Back to Home</a></p>
  </div>

<script>
// Check if already logged in + token expiry
  let token = localStorage.getItem('token');
  if (token) {
    try {
      // Quick expiry check (decode without verify)
      const payload = JSON.parse(atob(token.split('.')[1]));
      if (payload.exp * 1000 > Date.now() + 24*60*60*1000) { // Expires in >1 day
        localStorage.setItem('token', token);
      } else {
        // Try refresh
        await refreshTokenIfNeeded();
      }
    } catch (e) {
      localStorage.removeItem('token');
    }
    window.location.href = 'index.html';
  }

async function refreshTokenIfNeeded() {
  const token = localStorage.getItem('token');
  if (!token) return false;
  
  try {
    const response = await fetch('/api/auth/refresh', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      }
    });
    const data = await response.json();
    if (data.success) {
      localStorage.setItem('token', data.data.token);
      console.log('Token refreshed');
      return true;
    }
  } catch (e) {
    console.error('Token refresh failed', e);
    localStorage.removeItem('token');
  }
  return false;
}

  document.getElementById('loginBtn').addEventListener('click', async function() {
    const userid = document.getElementById('userid').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('loginBtn');

    errorEl.textContent = '';

    if (!userid || !password) {
      errorEl.textContent = 'Please enter UserID and Password';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ userid, password })
      });

      const data = await response.json();

      if (data.success) {
        // Store authentication data
        localStorage.setItem('token', data.data.token);
        localStorage.setItem('userid', data.data.userid);
        localStorage.setItem('userId', data.data.userId);
        localStorage.setItem('role', data.data.role || 'USER');
        
        // Redirect to index
        window.location.href = 'index.html';
      } else {
        errorEl.textContent = data.message || 'Login failed';
      }
    } catch (error) {
      console.error('Login error:', error);
      errorEl.textContent = 'Login failed. Please try again.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  });

  // Allow Enter key to submit
  document.getElementById('password').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      document.getElementById('loginBtn').click();
    }
  });
</script>
</body>
</html>
