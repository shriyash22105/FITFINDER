<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      width: 800px;
      height: 500px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .login-section {
      flex: 1;
      padding: 40px;
    }

    .login-section h2 {
      font-size: 22px;
      margin-bottom: 10px;
      font-family: Georgia, serif;
    }

    .login-section p {
      font-size: 14px;
      color: #777;
      margin-bottom: 20px;
    }

    .input-box {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 15px;
    }

    .login-btn:hover {
      background: #333;
    }

    .login-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .image-section {
      flex: 1;
      background: url('https://bostonwardrobes.co.nz/wp-content/uploads/2023/08/Article-2-Wardrobe-design-rules-from-the-experts-2.webp') no-repeat center center/cover;
      position: relative;
    }

    .register-link {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
    }

    .register-link a {
      color: #ff8c00;
      text-decoration: none;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="login-section">
      <h2>YOUR WELCOME!</h2>
      <p>Fit And Fashionable With Fit-Finder.</p>

      <input type="text" id="userid" placeholder="UserID" class="input-box">
      <input type="password" id="password" placeholder="Password" class="input-box">

      <button class="login-btn" id="loginBtn">Log in</button>
      <p class="error" id="error"></p>
      <p class="register-link">Don't have an account? <a href="register.html">Register here</a></p>
    </div>

    <div class="image-section"></div>
  </div>

<script>
  // Check if already logged in
  const token = localStorage.getItem('token');
  if (token) {
    window.location.href = 'index.html';
  }

  document.getElementById("loginBtn").addEventListener("click", async function() {
    const userid = document.getElementById("userid").value.trim();
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("loginBtn");

    errorEl.style.display = 'none';

    if (!userid || !password) {
      errorEl.textContent = 'Please enter UserID and Password';
      errorEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Logging in...';

    try {
      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ userid, password })
      });

      const data = await response.json();

      if (data.success) {
        // Store authentication data
        localStorage.setItem('token', data.data.token);
        localStorage.setItem('userid', data.data.userid);
        localStorage.setItem('userId', data.data.userId);
        localStorage.setItem('role', data.data.role || 'USER');
        
        // Redirect to index
        window.location.href = 'index.html';
      } else {
        errorEl.textContent = data.message || 'Invalid credentials';
        errorEl.style.display = 'block';
      }
    } catch (error) {
      console.error('Login error:', error);
      errorEl.textContent = 'Login failed. Please try again.';
      errorEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  });

  // Allow Enter key to submit
  document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === 'Enter') {
      document.getElementById("loginBtn").click();
    }
  });
</script>

</body>
</html>
